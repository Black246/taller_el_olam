{% extends "base.html" %}

{% block content %}
<h1 class="mb-4">✏️ Editar Producto</h1>

<div class="card">
    <div class="card-body">

        <form method="POST">

            <div class="row">

                <div class="col-md-6 mb-3">
                    <label class="form-label">Código *</label>
                    <input
                        type="text"
                        name="codigo"
                        class="form-control"
                        value="{{ producto.codigo }}"
                        required
                    >
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Nombre *</label>
                    <input
                        type="text"
                        name="nombre"
                        class="form-control"
                        value="{{ producto.nombre }}"
                        required
                    >
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Categoría</label>
                    <input
                        type="text"
                        name="categoria"
                        class="form-control"
                        value="{{ producto.categoria }}"
                        list="categorias"
                    >

                    <datalist id="categorias">
                        <option value="Motor">
                        <option value="Frenos">
                        <option value="Suspensión">
                        <option value="Electricidad">
                        <option value="Lubricantes">
                        <option value="Filtros">
                        <option value="Herramientas">
                    </datalist>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Ubicación</label>
                    <input
                        type="text"
                        name="ubicacion"
                        class="form-control"
                        value="{{ producto.ubicacion }}"
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Stock *</label>
                    <input
                        type="number"
                        name="stock"
                        class="form-control"
                        value="{{ producto.stock }}"
                        required
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Stock mínimo *</label>
                    <input
                        type="number"
                        name="stock_minimo"
                        class="form-control"
                        value="{{ producto.stock_minimo }}"
                        required
                    >
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Stock máximo</label>
                    <input
                        type="number"
                        name="stock_maximo"
                        class="form-control"
                        value="{{ producto.stock_maximo }}"
                    >
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Precio compra</label>
                    <input
                        type="number"
                        step="0.01"
                        name="precio_compra"
                        class="form-control"
                        value="{{ producto.precio_compra }}"
                    >
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Precio venta *</label>
                    <input
                        type="number"
                        step="0.01"
                        name="precio_venta"
                        class="form-control"
                        value="{{ producto.precio_venta }}"
                        required
                    >
                </div>

            </div>

            <div class="mt-3">

                <button
                    type="submit"
                    class="btn btn-primary"
                >
                    💾 Guardar Cambios
                </button>

                <a
                    href="{{ url_for('web.productos') }}"
                    class="btn btn-secondary"
                >
                    Cancelar
                </a>

            </div>

        </form>

    </div>
</div>

{% endblock %}
