
{% extends "base.html" %}

{% block content %}
<h1 class="mb-4">➕ Nuevo Producto</h1>

<script>
    // Obtener parámetros de la URL
    const urlParams = new URLSearchParams(window.location.search);
    const codigoUrl = urlParams.get('codigo');
    if (codigoUrl) {
        document.getElementById('codigo-input').value = codigoUrl;
    }
</script>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Código *</label>
                    <input  id="codigo-input" type="text" name="codigo" class="form-control" value="{{ codigo }}" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Nombre *</label>
                    <input type="text" name="nombre" class="form-control" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Categoría</label>
                    <input type="text" name="categoria" class="form-control" list="categorias">
                    <datalist id="categorias">
                        <option value="Motor">
                        <option value="Frenos">
                        <option value="Suspensión">
                        <option value="Electricidad">
                        <option value="Lubricantes">
                        <option value="Filtros">
                        <option value="Herramientas">
                    </datalist>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Ubicación</label>
                    <input type="text" name="ubicacion" class="form-control" placeholder="Estante A-1">
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Stock inicial *</label>
                    <input type="number" name="stock" class="form-control" value="0" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Stock mínimo *</label>
                    <input type="number" name="stock_minimo" class="form-control" value="5" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Stock máximo</label>
                    <input type="number" name="stock_maximo" class="form-control" value="100">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Precio compra</label>
                    <input type="number" step="0.01" name="precio_compra" class="form-control" value="0">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Precio venta *</label>
                    <input type="number" step="0.01" name="precio_venta" class="form-control" required>
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-primary">💾 Guardar Producto</button>
                <a href="{{ url_for('web.productos') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
