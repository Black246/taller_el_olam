{% extends "base.html" %}

{% block content %}
<h1 class="mb-4">🧾 Facturación POS</h1>

<div class="row">
    <!-- Carrito de compras -->
    <div class="col-md-5">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <strong>🛒 Carrito de Ventas</strong>
            </div>
            <div class="card-body" style="min-height: 400px;">
                <div id="carrito-lista">
                    <p class="text-muted text-center">No hay productos agregados</p>
                </div>
                <hr>
                <div class="row">
                    <div class="col-6">
                        <strong>Subtotal:</strong>
                        <span id="subtotal">$0</span>
                    </div>
                    <div class="col-6">
                        <strong>IVA (19%):</strong>
                        <span id="iva">$0</span>
                    </div>
                </div>
                <div class="row mt-2">
                    <div class="col-12">
                        <h4>Total: <span id="total">$0</span></h4>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Buscador de productos -->
    <div class="col-md-7">
        <div class="card mb-3">
            <div class="card-header bg-success text-white">
                <strong>🔍 Buscar Producto</strong>
            </div>
            <div class="card-body">
                <div class="input-group">
                    <input type="text" id="buscar-producto" class="form-control form-control-lg" 
                            placeholder="Código de barra o nombre del producto" autofocus>
                    <button class="btn btn-primary" id="btn-buscar">Buscar</button>
                </div>
                <div id="resultado-busqueda" class="mt-3" style="display: none;"></div>
            </div>
        </div>

        <!-- Datos del cliente -->
        <div class="card">
            <div class="card-header bg-info text-white">
                <strong>👤 Datos del Cliente</strong>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-8">
                        <label>Nombre / Razón Social</label>
                        <input type="text" id="cliente-nombre" class="form-control" placeholder="CONSUMIDOR FINAL">
                    </div>
                    <div class="col-md-4">
                        <label>R.U.T. / Documento</label>
                        <input type="text" id="cliente-documento" class="form-control" placeholder="Opcional">
                    </div>
                </div>
                <div class="row mt-3">
                    <div class="col-md-6">
                        <label>Método de Pago</label>
                        <select id="metodo-pago" class="form-control">
                            <option value="EFECTIVO">💵 Efectivo</option>
                            <option value="TARJETA_DEBITO">💳 Tarjeta Débito</option>
                            <option value="TARJETA_CREDITO">💳 Tarjeta Crédito</option>
                            <option value="TRANSFERENCIA">🏦 Transferencia</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>

        <div class="mt-3">
            <button id="btn-generar-factura" class="btn btn-success btn-lg w-100">
                🧾 GENERAR FACTURA Y COBRAR
            </button>
        </div>

        <div class="mt-2">
    <a href="{{ url_for('web.historial_facturas') }}?token={{ session.get('access_token') }}" 
        class="btn btn-info w-100">
        📋 VER HISTORIAL DE FACTURAS
    </a>
</div>

    </div>
</div>

<script>
    // ============ CONFIGURACIÓN INICIAL ============
    const ACCESS_TOKEN = localStorage.getItem("access_token");
    console.log("🔑 TOKEN:", ACCESS_TOKEN ? ACCESS_TOKEN.substring(0, 30) + "..." : "NO TOKEN");
    console.log("📏 Longitud token:", ACCESS_TOKEN ? ACCESS_TOKEN.length : 0);

    if (!ACCESS_TOKEN) {
        console.warn("⚠️ No hay token de autenticación");
        alert("⚠️ No has iniciado sesión. Por favor, inicia sesión para continuar.");
    }

    let carrito = [];
    let productosData = {{ productos | tojson }};
    
    // ============ ELEMENTOS DOM ============
    const buscarInput = document.getElementById('buscar-producto');
    const buscarBtn = document.getElementById('btn-buscar');
    const resultadoBusqueda = document.getElementById('resultado-busqueda');
    const btnGenerarFactura = document.getElementById('btn-generar-factura');
    
    // ============ FUNCIONES DE BÚSQUEDA ============
    function buscarProducto(termino) {
        if (!termino || termino.length < 2) {
            resultadoBusqueda.style.display = 'none';
            return;
        }
        
        console.log("🔍 Buscando:", termino);
        
        // Buscar en los productos locales
        const producto = productosData.find(p => 
            p.codigo.toLowerCase().includes(termino.toLowerCase()) || 
            p.nombre.toLowerCase().includes(termino.toLowerCase())
        );
        
        if (producto) {
            mostrarResultado(producto);
        } else {
            resultadoBusqueda.style.display = 'block';
            resultadoBusqueda.innerHTML = `
                <div class="alert alert-warning">
                    <i class="fas fa-exclamation-triangle"></i> Producto no encontrado
                </div>
            `;
        }
    }
    
    function mostrarResultado(producto) {
        resultadoBusqueda.style.display = 'block';
        resultadoBusqueda.innerHTML = `
            <div class="alert alert-success">
                <div class="row align-items-center">
                    <div class="col-6">
                        <strong>${producto.nombre}</strong><br>
                        <small>Código: ${producto.codigo}</small><br>
                        <small>Stock: ${producto.stock} | Precio: $${producto.precio_venta.toLocaleString()}</small>
                    </div>
                    <div class="col-4">
                        <input type="number" id="cantidad-${producto.id}" class="form-control" value="1" min="1" max="${producto.stock}">
                    </div>
                    <div class="col-2">
                        <button class="btn btn-primary btn-sm" onclick="agregarAlCarrito(${producto.id}, '${producto.nombre}', ${producto.precio_venta}, ${producto.stock})">
                            ➕ Agregar
                        </button>
                    </div>
                </div>
            </div>
        `;
    }
    
    // ============ FUNCIONES DEL CARRITO ============
    function agregarAlCarrito(id, nombre, precio, stockMax) {
        const cantidadInput = document.getElementById(`cantidad-${id}`);
        if (!cantidadInput) {
            console.error("❌ No se encontró el input de cantidad");
            return;
        }
        
        const cantidad = parseInt(cantidadInput.value) || 1;
        
        if (cantidad > stockMax) {
            alert(`❌ Stock insuficiente. Solo hay ${stockMax} unidades disponibles.`);
            return;
        }
        
        if (cantidad <= 0) {
            alert('❌ La cantidad debe ser mayor a 0');
            return;
        }
        
        const itemExistente = carrito.find(item => item.id === id);
        if (itemExistente) {
            if (itemExistente.cantidad + cantidad > stockMax) {
                alert(`❌ Stock insuficiente. Solo hay ${stockMax} disponibles.`);
                return;
            }
            itemExistente.cantidad += cantidad;
        } else {
            carrito.push({
                id: id,
                nombre: nombre,
                precio: precio,
                cantidad: cantidad
            });
        }
        
        console.log("✅ Producto agregado:", nombre, cantidad);
        actualizarCarrito();
        resultadoBusqueda.style.display = 'none';
        buscarInput.value = '';
        buscarInput.focus();
    }
    
    function actualizarCarrito() {
        const carritoLista = document.getElementById('carrito-lista');
        
        if (carrito.length === 0) {
            carritoLista.innerHTML = '<p class="text-muted text-center">No hay productos agregados</p>';
            document.getElementById('subtotal').innerHTML = '$0';
            document.getElementById('iva').innerHTML = '$0';
            document.getElementById('total').innerHTML = '$0';
            return;
        }
        
        let subtotal = 0;
        let html = '<div class="table-responsive"><table class="table table-sm">';
        html += '<thead><tr><th>Producto</th><th>Cant</th><th>Precio</th><th>Subtotal</th><th></th></tr></thead><tbody>';
        
        carrito.forEach((item, index) => {
            const itemSubtotal = item.cantidad * item.precio;
            subtotal += itemSubtotal;
            html += `
                <tr>
                    <td><small>${item.nombre}</small></td>
                    <td>${item.cantidad}</td>
                    <td>$${item.precio.toLocaleString()}</td>
                    <td>$${itemSubtotal.toLocaleString()}</td>
                    <td>
                        <button class="btn btn-sm btn-danger" onclick="eliminarDelCarrito(${index})">
                            🗑️
                        </button>
                    </td>
                </tr>
            `;
        });
        
        html += '</tbody></table></div>';
        carritoLista.innerHTML = html;
        
        const iva = subtotal * 0.19;
        const total = subtotal + iva;
        
        document.getElementById('subtotal').innerHTML = `$${subtotal.toLocaleString()}`;
        document.getElementById('iva').innerHTML = `$${iva.toLocaleString()}`;
        document.getElementById('total').innerHTML = `$${total.toLocaleString()}`;
        
        console.log("🛒 Carrito actualizado:", carrito.length, "items, Total:", total);
    }
    
    function eliminarDelCarrito(index) {
        carrito.splice(index, 1);
        actualizarCarrito();
    }

    // ============ FUNCIÓN PARA ABRIR PDF ============
    async function abrirPDF(pdfUrl) {
        try {
            const token = localStorage.getItem("access_token");
            if (!token) {
                alert("❌ No hay token de autenticación. Por favor, inicia sesión nuevamente.");
                return false;
            }

            console.log("📄 Solicitando PDF:", pdfUrl);
            
            const response = await fetch(pdfUrl, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            });

            if (!response.ok) {
                const errorText = await response.text();
                console.error("❌ Error al obtener PDF:", response.status, errorText);
                
                if (response.status === 401) {
                    alert("❌ Sesión expirada. Por favor, inicia sesión nuevamente.");
                    localStorage.removeItem("access_token");
                    window.location.href = "/login";
                    return false;
                }
                
                alert(`❌ Error al abrir PDF: ${response.status} ${response.statusText}`);
                return false;
            }

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            
            // Abrir en nueva ventana
            const nuevaVentana = window.open(url, '_blank');
            if (!nuevaVentana) {
                alert("⚠️ El navegador bloqueó la ventana emergente. Permite popups para este sitio.");
                return false;
            }
            
            // Liberar memoria después de 10 segundos
            setTimeout(() => window.URL.revokeObjectURL(url), 10000);
            
            console.log("✅ PDF abierto correctamente");
            return true;
            
        } catch (error) {
            console.error("❌ Error al abrir PDF:", error);
            alert('❌ Error al abrir el PDF: ' + error.message);
            return false;
        }
    }
    
    // ============ FUNCIÓN PRINCIPAL: GENERAR FACTURA ============
    async function generarFactura() {
        // Validar carrito
        if (carrito.length === 0) {
            alert('❌ Agrega productos al carrito primero');
            return;
        }
        
        // Validar token
        const accessToken = localStorage.getItem("access_token");
        if (!accessToken) {
            alert("❌ No hay token de autenticación. Por favor, inicia sesión.");
            window.location.href = "/login";
            return;
        }
        
        // Obtener datos del cliente
        const clienteNombre = document.getElementById('cliente-nombre').value.trim() || 'CONSUMIDOR FINAL';
        const clienteDocumento = document.getElementById('cliente-documento').value.trim();
        const metodoPago = document.getElementById('metodo-pago').value;
        
        // Preparar items
        const items = carrito.map(item => ({
            producto_id: item.id,
            cantidad: item.cantidad,
            precio: item.precio
        }));
        
        console.log("📦 Items a facturar:", items);
        console.log("👤 Cliente:", clienteNombre);
        console.log("💳 Método de pago:", metodoPago);
        
        // Deshabilitar botón
        const btn = document.getElementById('btn-generar-factura');
        btn.disabled = true;
        btn.innerHTML = '⏳ Procesando...';
        
        try {
            // Enviar petición
            const response = await fetch('/api/facturas/', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${accessToken}`
                },
                body: JSON.stringify({
                    cliente_nombre: clienteNombre,
                    cliente_documento: clienteDocumento,
                    metodo_pago: metodoPago,
                    items: items
                })
            });
            
            // Leer respuesta
            const data = await response.json();
            console.log("📨 Respuesta del servidor:", data);
            
            // Manejar errores
            if (!response.ok) {
                if (response.status === 401) {
                    alert("❌ Sesión expirada. Por favor, inicia sesión nuevamente.");
                    localStorage.removeItem("access_token");
                    window.location.href = "/login";
                    return;
                }
                
                const errorMsg = data.error || data.message || `Error ${response.status}`;
                throw new Error(errorMsg);
            }
            
            // Éxito
            if (data.success) {
                // Mostrar mensaje de éxito
                alert(`✅ ¡Factura ${data.folio} generada exitosamente!\nTotal: $${data.total.toLocaleString()}`);
                
                // Abrir PDF
                if (data.pdf_url) {
                    const pdfAbierto = await abrirPDF(data.pdf_url);
                    if (!pdfAbierto) {
                        console.warn("⚠️ No se pudo abrir el PDF automáticamente");
                    }
                } else {
                    console.warn("⚠️ No se recibió URL del PDF");
                }
                
                // Limpiar carrito
                carrito = [];
                actualizarCarrito();
                
                // Limpiar datos del cliente
                document.getElementById('cliente-nombre').value = '';
                document.getElementById('cliente-documento').value = '';
                
                // Enfocar búsqueda
                buscarInput.focus();
                
            } else {
                throw new Error(data.error || 'No se pudo generar la factura');
            }
            
        } catch (error) {
            console.error("❌ Error al generar factura:", error);
            alert('❌ Error: ' + error.message);
        } finally {
            // Restaurar botón
            btn.disabled = false;
            btn.innerHTML = '🧾 GENERAR FACTURA Y COBRAR';
        }
    }
    
    // ============ EVENT LISTENERS ============
    
    // Botón buscar
    buscarBtn.addEventListener('click', () => {
        const termino = buscarInput.value.trim();
        if (termino) {
            buscarProducto(termino);
        } else {
            resultadoBusqueda.style.display = 'none';
        }
    });
    
    // Enter en búsqueda
    buscarInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            const termino = buscarInput.value.trim();
            if (termino) {
                buscarProducto(termino);
            }
        }
    });

    // Búsqueda automática con debounce
    let timeoutId = null;
    buscarInput.addEventListener('input', () => {
        clearTimeout(timeoutId);
        const valor = buscarInput.value.trim();
        
        if (valor.length >= 2) {
            timeoutId = setTimeout(() => buscarProducto(valor), 500);
        } else {
            resultadoBusqueda.style.display = 'none';
        }
    });
    
    // Botón generar factura
    btnGenerarFactura.addEventListener('click', generarFactura);
    
    // ============ INICIALIZACIÓN ============
    console.log("✅ POS inicializado correctamente");
    console.log("📦 Productos disponibles:", productosData.length);
    console.log("🛒 Carrito vacío");
    
    // Enfocar búsqueda al cargar
    buscarInput.focus();
</script>
{% endblock %}
