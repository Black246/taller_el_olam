{% extends "base.html" %}

{% block content %}
<h1 class="mb-4">🔧 Registrar Salida (Uso en taller)</h1>

<div class="card">
    <div class="card-body">
        <form method="POST">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Producto *</label>
                    <select name="producto_id" id="productoSelect" class="form-control" required>
                        <option value="">Seleccione un producto...</option>
                        {% for p in productos %}
                        <option value="{{ p.id }}" data-stock="{{ p.stock }}">
                            {{ p.codigo }} - {{ p.nombre }} (Stock: {{ p.stock }})
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Cantidad *</label>
                    <input type="number" name="cantidad" id="cantidad" class="form-control" required min="1">
                    <small id="stockMsg" class="text-muted"></small>
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Técnico</label>
                    <input type="text" name="tecnico" class="form-control" placeholder="Nombre del mecánico">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Motivo *</label>
                    <select name="motivo" class="form-control" required>
                        <option value="Uso en reparación">🔧 Uso en reparación</option>
                        <option value="Venta a cliente">💰 Venta a cliente</option>
                        <option value="Merma">⚠️ Merma / Daño</option>
                        <option value="Ajuste de inventario">📊 Ajuste de inventario</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Orden de trabajo</label>
                    <input type="text" name="orden_trabajo" class="form-control" placeholder="Ej: OT-2025-001">
                </div>
            </div>
            <div class="mt-3">
                <button type="submit" class="btn btn-warning">✅ Registrar Salida</button>
                <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>

<script>
    const productoSelect = document.getElementById('productoSelect');
    const cantidadInput = document.getElementById('cantidad');
    const stockMsg = document.getElementById('stockMsg');
    
    productoSelect.addEventListener('change', function() {
        const selected = this.options[this.selectedIndex];
        const stock = selected.getAttribute('data-stock');
        if(stock) {
            stockMsg.innerHTML = `Stock disponible: ${stock} unidades`;
            stockMsg.style.color = stock > 0 ? 'green' : 'red';
            cantidadInput.max = stock;
        } else {
            stockMsg.innerHTML = '';
        }
    });
    
    cantidadInput.addEventListener('input', function() {
        const selected = productoSelect.options[productoSelect.selectedIndex];
        const stock = selected.getAttribute('data-stock');
        if(stock && parseInt(this.value) > parseInt(stock)) {
            this.style.borderColor = 'red';
            stockMsg.innerHTML = `⚠️ No puedes sacar más de ${stock} unidades`;
            stockMsg.style.color = 'red';
        } else {
            this.style.borderColor = '';
            if(stock) stockMsg.innerHTML = `Stock disponible: ${stock} unidades`;
        }
    });
</script>
{% endblock %}
