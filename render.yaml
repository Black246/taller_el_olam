# render.yaml - Raíz del repositorio
services:
  - type: web
    name: taller-el-olam
    env: python
    region: oregon  # o frankfurt, singapore, etc.
    
    # Ruta al código - Render buscará dentro de backend/
    rootDir: backend
    
    # Comandos de construcción
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    
    # Comando de inicio
    startCommand: gunicorn wsgi:app
    
    # Variables de entorno
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.9
      - key: DATABASE_URL
        fromDatabase:
          name: taller-db
          property: connectionString
    
    # Configuración de la aplicación
    healthCheckPath: /health
    autoDeploy: true
    numReplicas: 1
    
    # Plan de recursos
    plan: starter  # o professional si necesitas más

  - type: postgresql
    name: taller-db
    region: oregon
    plan: starter
    databaseName: taller_el_olam
    user: taller_user